<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Viewport desktop-first -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO - Balises essentielles -->
    <title>Bibliothèques de Bordeaux — Site officiel | Catalogue, Agenda, Patrimoine</title>
    <meta name="description" content="Site officiel des Bibliothèques de Bordeaux. Explorez 1,3 million de documents, réservez un service, consultez l'agenda culturel et découvrez le patrimoine Séléné." />
    <meta name="keywords" content="bibliothèque Bordeaux, catalogue en ligne, patrimoine, Séléné, agenda culturel, réservation, livres, médiathèque" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#204140" />
    <meta name="author" content="Bibliothèques de Bordeaux" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title"       content="Bibliothèques de Bordeaux — Site officiel" />
    <meta property="og:description" content="Explorez, découvrez, vivez la culture. 1,3 million de documents à portée de main." />
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://bibliotheques.bordeaux.fr" />
    <meta property="og:locale"      content="fr_FR" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Bibliothèques de Bordeaux — Site officiel" />
    <meta name="twitter:description" content="Explorez, découvrez, vivez la culture." />

    <!-- Référencement local (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Library",
      "name": "Bibliothèques de Bordeaux",
      "url": "https://bibliotheques.bordeaux.fr",
      "description": "Réseau de bibliothèques municipales de Bordeaux",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Bordeaux",
        "addressCountry": "FR"
      }
    }
    </script>

    <!-- Styles override globaux -->
    <style>
      #root {
        min-height: 100dvh;
        width: 100%;
        max-width: none;
        margin: 0;
        padding: 0;
        background-color: transparent;
      }
      /* Masque la scrollbar du carrousel */
      .overflow-x-auto::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
